<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-labelledby="complete-title complete-desc">
  <title id="complete-title">You're All Set</title>
  <desc id="complete-desc">Checkmark indicating setup is complete with next steps</desc>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #24292f;
      --fg-muted: #656d76;
      --accent: #0969da;
      --card-bg: #f6f8fa;
      --card-border: #d0d7de;
      --green: #1a7f37;
      --green-bg: #dafbe1;
      --check-ring: #1a7f37;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --fg-muted: #8b949e;
        --accent: #58a6ff;
        --card-bg: #161b22;
        --card-border: #30363d;
        --green: #3fb950;
        --green-bg: #0d1f12;
        --check-ring: #3fb950;
      }
    }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="400" height="260" rx="8" fill="var(--bg)"/>

  <!-- Checkmark circle -->
  <circle cx="200" cy="80" r="36" fill="var(--green-bg)" stroke="var(--check-ring)" stroke-width="2"/>
  <polyline points="182,80 194,92 218,68" fill="none" stroke="var(--green)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="200" y="140" text-anchor="middle" fill="var(--fg)" font-size="16" font-weight="600">You're all set!</text>
  <text x="200" y="160" text-anchor="middle" fill="var(--fg-muted)" font-size="11">Your skills are ready to use</text>

  <!-- Next steps -->
  <rect x="60" y="180" width="280" height="60" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
  <text x="82" y="200" fill="var(--fg-muted)" font-size="10">Next steps</text>
  <text x="82" y="218" fill="var(--fg)" font-size="11">View skills in sidebar</text>
  <text x="82" y="232" fill="var(--fg)" font-size="11">Share with your team via skills.json</text>

  <!-- Accent line -->
  <rect x="72" y="192" width="3" height="38" rx="1.5" fill="var(--accent)"/>
</svg>
