<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-labelledby="install-title install-desc">
  <title id="install-title">Install Your First Skill</title>
  <desc id="install-desc">Marketplace grid showing skill cards with install buttons</desc>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #24292f;
      --fg-muted: #656d76;
      --accent: #0969da;
      --card-bg: #f6f8fa;
      --card-border: #d0d7de;
      --green: #1a7f37;
      --green-bg: #dafbe1;
      --btn-bg: #0969da;
      --btn-fg: #ffffff;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --fg-muted: #8b949e;
        --accent: #58a6ff;
        --card-bg: #161b22;
        --card-border: #30363d;
        --green: #3fb950;
        --green-bg: #0d1f12;
        --btn-bg: #238636;
        --btn-fg: #ffffff;
      }
    }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="400" height="260" rx="8" fill="var(--bg)"/>

  <!-- Title -->
  <text x="200" y="32" text-anchor="middle" fill="var(--fg)" font-size="14" font-weight="600">Marketplace</text>

  <!-- Skill card 1 -->
  <rect x="24" y="50" width="168" height="80" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
  <text x="36" y="72" fill="var(--fg)" font-size="12" font-weight="600">vitest</text>
  <text x="36" y="88" fill="var(--fg-muted)" font-size="10">Fast unit testing framework</text>
  <rect x="36" y="102" width="56" height="20" rx="10" fill="var(--btn-bg)"/>
  <text x="64" y="116" text-anchor="middle" fill="var(--btn-fg)" font-size="9" font-weight="500">Install</text>

  <!-- Skill card 2 -->
  <rect x="208" y="50" width="168" height="80" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
  <text x="220" y="72" fill="var(--fg)" font-size="12" font-weight="600">nextjs</text>
  <text x="220" y="88" fill="var(--fg-muted)" font-size="10">React framework best practices</text>
  <rect x="220" y="102" width="56" height="20" rx="10" fill="var(--btn-bg)"/>
  <text x="248" y="116" text-anchor="middle" fill="var(--btn-fg)" font-size="9" font-weight="500">Install</text>

  <!-- Skill card 3 -->
  <rect x="24" y="142" width="168" height="80" rx="6" fill="var(--card-bg)" stroke="var(--green)" stroke-width="1.5"/>
  <text x="36" y="164" fill="var(--fg)" font-size="12" font-weight="600">supabase</text>
  <text x="36" y="180" fill="var(--fg-muted)" font-size="10">Postgres &amp; auth patterns</text>
  <rect x="36" y="194" width="68" height="20" rx="10" fill="var(--green-bg)" stroke="var(--green)" stroke-width="1"/>
  <text x="70" y="208" text-anchor="middle" fill="var(--green)" font-size="9" font-weight="500">Installed</text>

  <!-- Skill card 4 -->
  <rect x="208" y="142" width="168" height="80" rx="6" fill="var(--card-bg)" stroke="var(--card-border)" stroke-width="1"/>
  <text x="220" y="164" fill="var(--fg)" font-size="12" font-weight="600">tailwind-v4</text>
  <text x="220" y="180" fill="var(--fg-muted)" font-size="10">Utility-first CSS framework</text>
  <rect x="220" y="194" width="56" height="20" rx="10" fill="var(--btn-bg)"/>
  <text x="248" y="208" text-anchor="middle" fill="var(--btn-fg)" font-size="9" font-weight="500">Install</text>

  <!-- Footer -->
  <text x="200" y="248" text-anchor="middle" fill="var(--accent)" font-size="11" font-weight="500">Browse hundreds of community skills</text>
</svg>
