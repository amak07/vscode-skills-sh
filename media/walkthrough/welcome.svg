<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" role="img" aria-labelledby="welcome-title welcome-desc">
  <title id="welcome-title">Welcome to Skills.sh</title>
  <desc id="welcome-desc">Agent skills badges for Claude Code, Cursor, Copilot, Windsurf, Codex, and more</desc>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #24292f;
      --fg-muted: #656d76;
      --accent: #0969da;
      --card-bg: #f6f8fa;
      --card-border: #d0d7de;
      --purple: #8250df;
      --blue: #0969da;
      --pink: #bf3989;
      --green: #1a7f37;
      --orange: #bc4c00;
      --teal: #0550ae;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --fg: #e6edf3;
        --fg-muted: #8b949e;
        --accent: #58a6ff;
        --card-bg: #161b22;
        --card-border: #30363d;
        --purple: #bc8cff;
        --blue: #58a6ff;
        --pink: #f778ba;
        --green: #3fb950;
        --orange: #d29922;
        --teal: #79c0ff;
      }
    }
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="400" height="260" rx="8" fill="var(--bg)"/>

  <!-- Title -->
  <text x="200" y="36" text-anchor="middle" fill="var(--fg)" font-size="16" font-weight="600">Agent Skills</text>
  <text x="200" y="56" text-anchor="middle" fill="var(--fg-muted)" font-size="11">The open standard for extending AI coding assistants</text>

  <!-- Agent badges - row 1 -->
  <rect x="40" y="78" width="96" height="30" rx="15" fill="var(--card-bg)" stroke="var(--purple)" stroke-width="1.2"/>
  <text x="88" y="97" text-anchor="middle" fill="var(--purple)" font-size="11" font-weight="500">Claude Code</text>

  <rect x="152" y="78" width="96" height="30" rx="15" fill="var(--card-bg)" stroke="var(--blue)" stroke-width="1.2"/>
  <text x="200" y="97" text-anchor="middle" fill="var(--blue)" font-size="11" font-weight="500">Cursor</text>

  <rect x="264" y="78" width="96" height="30" rx="15" fill="var(--card-bg)" stroke="var(--pink)" stroke-width="1.2"/>
  <text x="312" y="97" text-anchor="middle" fill="var(--pink)" font-size="11" font-weight="500">Copilot</text>

  <!-- Agent badges - row 2 -->
  <rect x="68" y="118" width="96" height="30" rx="15" fill="var(--card-bg)" stroke="var(--green)" stroke-width="1.2"/>
  <text x="116" y="137" text-anchor="middle" fill="var(--green)" font-size="11" font-weight="500">Windsurf</text>

  <rect x="180" y="118" width="72" height="30" rx="15" fill="var(--card-bg)" stroke="var(--orange)" stroke-width="1.2"/>
  <text x="216" y="137" text-anchor="middle" fill="var(--orange)" font-size="11" font-weight="500">Codex</text>

  <rect x="268" y="118" width="72" height="30" rx="15" fill="var(--card-bg)" stroke="var(--teal)" stroke-width="1.2"/>
  <text x="304" y="137" text-anchor="middle" fill="var(--teal)" font-size="11" font-weight="500">+8 more</text>

  <!-- Divider -->
  <line x1="80" y1="168" x2="320" y2="168" stroke="var(--card-border)" stroke-width="1"/>

  <!-- Skills.sh branding -->
  <text x="200" y="196" text-anchor="middle" fill="var(--fg)" font-size="14" font-weight="600">skills.sh</text>
  <text x="200" y="214" text-anchor="middle" fill="var(--fg-muted)" font-size="11">by Vercel</text>

  <!-- Tagline -->
  <text x="200" y="244" text-anchor="middle" fill="var(--accent)" font-size="11" font-weight="500">Discover, install, and manage skills from one place</text>
</svg>
