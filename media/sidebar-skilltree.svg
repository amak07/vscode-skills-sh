    <line x1="12" y1="20" x2="12" y2="6" opacity="0.65"/>
    <path d="M 12,20 C 10,16 7,12 3.5,9" opacity="0.6"/>
    <path d="M 12,20 C 14,16 17,12 20.5,9" opacity="0.6"/>
