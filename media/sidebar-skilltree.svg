  <circle cx="3" cy="8" r="2" stroke="currentColor" stroke-width="1.3" fill="none" opacity="0.7"/>
  <circle cx="21" cy="8" r="2" stroke="currentColor" stroke-width="1.3" fill="none" opacity="0.7"/>
